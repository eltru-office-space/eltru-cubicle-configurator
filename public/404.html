<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Eltru</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #F4F1EC;
      color: #1C1A17;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border: 1px solid #E0DCD4;
      border-radius: 16px;
      padding: 56px 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 24px;
      font-weight: 500;
      color: #1C3B2A;
      letter-spacing: 0.04em;
      margin-bottom: 32px;
    }
    .logo span { color: #B8965A; }
    .code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 72px;
      font-weight: 400;
      color: #E0DCD4;
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 28px;
      font-weight: 400;
      color: #1C1A17;
      margin-bottom: 12px;
    }
    p {
      font-size: 13px;
      color: #9A9488;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    a {
      display: inline-block;
      padding: 11px 24px;
      background: #1C3B2A;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }
    a:hover { background: #244d36; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">elt<span>ru</span>.</div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Go to Configurator</a>
  </div>
</body>
</html>
