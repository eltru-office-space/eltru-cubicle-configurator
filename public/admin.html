<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eltru Admin</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #F4F1EC;
  --white:        #FFFFFF;
  --border:       #E0DCD4;
  --text:         #1C1A17;
  --muted:        #9A9488;
  --accent:       #1C3B2A;
  --accent-light: #E8F0EB;
  --accent2:      #2A5A3F;
  --err:          #C0392B;
  --warn:         #D97706;
  --r:            12px;
  --shadow:       0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg:    0 8px 32px rgba(0,0,0,0.12);
}

body { font-family: 'Geist', 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* ── Gate ─────────────────────────────────────────────── */
#gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.gate-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 48px 52px; width: 380px; box-shadow: var(--shadow-lg); text-align: center; }
.gate-logo { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; color: var(--accent); letter-spacing: .04em; margin-bottom: 4px; }
.gate-sub { font-size: .7rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 32px; }
.gate-label { font-size: .7rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); text-align: left; margin-bottom: 6px; display: block; }
.gate-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: .9rem; background: var(--bg); color: var(--text); outline: none; transition: border-color .2s; margin-bottom: 16px; text-align: center; letter-spacing: .1em; }
.gate-input:focus { border-color: var(--accent); }
.gate-input.shake { animation: shake .4s ease; border-color: var(--err); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
.gate-err { font-size: .78rem; color: var(--err); min-height: 18px; margin-bottom: 8px; }
.gate-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: .82rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; transition: background .2s; }
.gate-btn:hover { background: var(--accent2); }
.gate-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── App layout ───────────────────────────────────────── */
#app { display: none; min-height: 100vh; flex-direction: column; }

/* ── Header ───────────────────────────────────────────── */
.app-header { background: var(--accent); color: #fff; padding: 0 32px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 700; letter-spacing: .04em; }
.header-logo span { opacity: .65; font-weight: 400; }
.header-nav { display: flex; gap: 4px; background: rgba(255,255,255,.1); border-radius: 8px; padding: 4px; }
.nav-btn { padding: 7px 18px; border: none; border-radius: 6px; font-family: inherit; font-size: .78rem; font-weight: 500; letter-spacing: .04em; cursor: pointer; background: transparent; color: rgba(255,255,255,.7); transition: all .15s; }
.nav-btn:hover { color: #fff; background: rgba(255,255,255,.1); }
.nav-btn.active { background: #fff; color: var(--accent); font-weight: 600; }
.btn-logout { font-size: .73rem; color: rgba(255,255,255,.6); cursor: pointer; background: none; border: 1px solid rgba(255,255,255,.25); border-radius: 6px; padding: 6px 14px; font-family: inherit; transition: all .2s; }
.btn-logout:hover { color: #fff; border-color: rgba(255,255,255,.5); }

/* ── Switcher bar ─────────────────────────────────────── */
.switchers-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; gap: 24px; }
.brand-switcher { display: flex; gap: 8px; }
.brand-btn { padding: 10px 24px; border: 1.5px solid var(--border); border-radius: 8px; background: transparent; font-family: inherit; font-size: .82rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; letter-spacing: .02em; }
.brand-btn:hover { border-color: var(--accent); color: var(--accent); }
.brand-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.switcher-divider { width: 1px; height: 28px; background: var(--border); }
.style-switcher { display: flex; gap: 6px; }
.style-btn { padding: 7px 18px; border: 1.5px solid var(--border); border-radius: 20px; background: transparent; font-family: inherit; font-size: .78rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .15s; }
.style-btn:hover { border-color: var(--accent); color: var(--accent); }
.style-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }

/* ── Content area ─────────────────────────────────────── */
.content-area { max-width: 900px; margin: 0 auto; padding: 32px 32px 64px; }

/* ── Loading state ────────────────────────────────────── */
.loading-state { text-align: center; padding: 64px 32px; color: var(--muted); font-size: .88rem; }
.loading-state::before { content: ''; display: block; width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-state { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: var(--r); padding: 20px 24px; color: var(--err); font-size: .85rem; margin-bottom: 24px; }

/* ── Size cards ───────────────────────────────────────── */
.size-card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 24px; box-shadow: var(--shadow); overflow: hidden; }

/* Card header */
.card-header { display: flex; align-items: center; gap: 20px; padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
.card-header-thumb { width: 80px; height: 60px; border-radius: 8px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.card-header-thumb img { width: 100%; height: 100%; object-fit: cover; }
.card-header-info { flex: 1; }
.card-size-label { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; color: var(--text); line-height: 1.1; }
.card-brand-style { font-size: .72rem; color: var(--muted); margin-top: 2px; letter-spacing: .04em; }
.card-base-price { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
.base-price-label { font-size: .68rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
.base-price-row { display: flex; align-items: baseline; gap: 2px; }
.base-price-sign { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--accent); }
.base-price-input { border: none; border-bottom: 2px solid transparent; outline: none; background: transparent; color: var(--accent); font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 700; width: 90px; text-align: right; transition: border-color .2s; padding: 0; line-height: 1; }
.base-price-input:focus { border-bottom-color: var(--accent); }
.base-price-input.dirty { border-bottom-color: var(--warn); }
.base-price-input.saved { border-bottom-color: var(--accent); }
.base-price-sub { font-size: .68rem; color: var(--muted); }

/* Card body */
.card-body { padding: 0 24px; }

/* Section dividers */
.section-divider { font-size: .65rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: 16px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

/* Option rows */
.option-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(224,220,212,.5); }
.option-row:last-child { border-bottom: none; }
.row-thumb { width: 48px; height: 36px; border-radius: 6px; flex-shrink: 0; overflow: hidden; position: relative; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
.row-thumb img { width: 100%; height: 100%; object-fit: cover; }
.status-dot { position: absolute; top: 3px; right: 3px; width: 7px; height: 7px; border-radius: 50%; border: 1px solid rgba(255,255,255,.8); }
.status-dot.green { background: #22C55E; }
.status-dot.red   { background: #EF4444; }
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: .82rem; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
.swatch { width: 12px; height: 12px; border-radius: 50%; border: 1px solid rgba(0,0,0,.1); flex-shrink: 0; }
.row-desc { font-size: .72rem; color: var(--muted); margin-top: 1px; }
.row-price { flex-shrink: 0; display: flex; align-items: center; min-width: 100px; justify-content: flex-end; }
.price-field { display: flex; align-items: baseline; gap: 2px; }
.price-prefix { font-size: .8rem; color: var(--muted); }
.row-price-input { border: none; border-bottom: 2px solid transparent; outline: none; background: transparent; color: var(--accent); font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 600; width: 70px; text-align: right; transition: border-color .2s; padding: 0; }
.row-price-input:focus { border-bottom-color: var(--accent); }
.row-price-input.dirty { border-bottom-color: var(--warn); }
.row-price-input.saved { border-bottom-color: var(--accent); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 500; letter-spacing: .04em; }
.badge-included { background: #F3F4F6; color: var(--muted); }
.badge-always { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.row-actions { flex-shrink: 0; }
.btn-upload { padding: 5px 12px; border-radius: 6px; font-family: inherit; font-size: .7rem; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-upload.missing  { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
.btn-upload.missing:hover  { background: var(--accent-light); }
.btn-upload.uploaded { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
.btn-upload.uploaded:hover { border-color: var(--accent); color: var(--accent); }

/* Card footer */
.card-footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-top: 1px solid var(--border); background: var(--bg); }
.footer-hint { font-size: .72rem; color: var(--muted); }
.btn-save-all { padding: 9px 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: inherit; font-size: .78rem; font-weight: 600; letter-spacing: .04em; cursor: pointer; transition: background .2s; }
.btn-save-all:hover { background: var(--accent2); }
.btn-save-all:disabled { opacity: .5; cursor: not-allowed; }

/* ── Pedestal section ─────────────────────────────────── */
.pedestal-section { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); box-shadow: var(--shadow); overflow: hidden; }
.pedestal-section-header { padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
.pedestal-section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; color: var(--text); }
.pedestal-section-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }
.pedestal-body { padding: 0 24px; }
.pedestal-footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-top: 1px solid var(--border); background: var(--bg); }

/* ── Orders section ───────────────────────────────────── */
.orders-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }
.orders-filters { display: flex; gap: 10px; flex-wrap: wrap; flex: 1; }
.orders-search { flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: .82rem; background: var(--white); color: var(--text); outline: none; transition: border-color .2s; }
.orders-search:focus { border-color: var(--accent); }
.date-input { padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; font-size: .8rem; background: var(--white); color: var(--text); outline: none; transition: border-color .2s; }
.date-input:focus { border-color: var(--accent); }
.btn-csv { padding: 9px 18px; background: transparent; border: 1.5px solid var(--border); color: var(--muted); border-radius: 8px; font-family: inherit; font-size: .78rem; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn-csv:hover { border-color: var(--accent); color: var(--accent); }
.table-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; }
thead th { background: var(--bg); padding: 11px 16px; text-align: left; font-size: .68rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
tbody td { padding: 12px 16px; font-size: .82rem; border-bottom: 1px solid rgba(224,220,212,.5); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(244,241,236,.5); }
.config-code { font-family: 'Geist', monospace; font-size: .8rem; font-weight: 600; color: var(--accent); letter-spacing: .06em; }
.actions-cell { display: flex; gap: 6px; }
.btn-action { padding: 4px 10px; border-radius: 5px; font-family: inherit; font-size: .7rem; font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none; display: inline-block; border: 1.5px solid; }
.btn-view    { border-color: var(--border); color: var(--muted); background: transparent; }
.btn-view:hover { border-color: var(--accent); color: var(--accent); }
.btn-quote   { border-color: var(--accent); color: var(--accent); background: transparent; }
.btn-quote:hover { background: var(--accent-light); }
.btn-pdf     { border-color: var(--border); color: var(--muted); background: transparent; }
.btn-pdf:hover { border-color: var(--muted); }

/* ── Toasts ───────────────────────────────────────────── */
#toasts { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { padding: 12px 20px; border-radius: 8px; font-size: .82rem; font-weight: 500; box-shadow: var(--shadow-lg); animation: toast-in .25s ease; pointer-events: all; max-width: 320px; }
.toast-success { background: var(--accent); color: #fff; }
.toast-error   { background: var(--err); color: #fff; }
.toast-warn    { background: var(--warn); color: #fff; }
@keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── Placeholder images ───────────────────────────────── */
.thumb-bg    { background: linear-gradient(135deg, #d4cfca, #f4f1ec); width: 100%; height: 100%; }
.thumb-glass { background: rgba(100,160,220,.25); width: 100%; height: 100%; }
.thumb-ped   { background: #e8e4df; width: 100%; height: 100%; }

/* ── No data ──────────────────────────────────────────── */
.no-data { text-align: center; padding: 48px; color: var(--muted); font-size: .85rem; }
</style>
</head>
<body>

<!-- ── Login gate ──────────────────────────────────────── -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">eltru.</div>
    <div class="gate-sub">Admin Portal</div>
    <label class="gate-label" for="gate-pw">Admin Password</label>
    <input id="gate-pw" class="gate-input" type="password" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="gate-err" id="gate-err"></div>
    <button class="gate-btn" id="gate-btn" onclick="doLogin()">Enter Admin</button>
  </div>
</div>

<!-- ── App ─────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <header class="app-header">
    <div class="header-logo">eltru. <span>admin</span></div>
    <nav class="header-nav">
      <button class="nav-btn active" id="nav-products" onclick="showSection('products')">Products &amp; Pricing</button>
      <button class="nav-btn" id="nav-orders" onclick="showSection('orders')">Orders</button>
    </nav>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </header>

  <!-- Products & Pricing -->
  <div id="section-products">
    <div class="switchers-bar">
      <div class="brand-switcher">
        <button class="brand-btn active" id="brand-knoll-reff" onclick="selectBrand('knoll-reff')">Knoll Reff</button>
        <button class="brand-btn" id="brand-steelcase-avenir" onclick="selectBrand('steelcase-avenir')">Steelcase Avenir</button>
      </div>
      <div class="switcher-divider"></div>
      <div class="style-switcher">
        <button class="style-btn active" id="style-straight" onclick="selectStyle('straight')">Straight</button>
        <button class="style-btn" id="style-l-shape" onclick="selectStyle('l-shape')">L-Shape</button>
      </div>
    </div>
    <div class="content-area">
      <div id="products-loading" class="loading-state"></div>
      <div id="products-error" style="display:none" class="error-state"></div>
      <div id="size-cards"></div>
      <div id="pedestal-section"></div>
    </div>
  </div>

  <!-- Orders -->
  <div id="section-orders" style="display:none">
    <div class="content-area">
      <div class="orders-header">
        <div class="orders-filters">
          <input type="text" class="orders-search" id="orders-search" placeholder="Search code or client…" oninput="filterOrders()">
          <input type="date" class="date-input" id="orders-from" onchange="filterOrders()">
          <input type="date" class="date-input" id="orders-to" onchange="filterOrders()">
        </div>
        <button class="btn-csv" onclick="exportCSV()">Export CSV</button>
      </div>
      <div id="orders-loading" class="loading-state"></div>
      <div id="orders-table-wrap" style="display:none">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Date</th>
                <th>Size</th>
                <th>Client</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast container & shared file input -->
<div id="toasts"></div>
<input type="file" id="shared-file-input" accept="image/png,image/webp,image/jpeg" style="display:none">

<script>
// ── State ─────────────────────────────────────────────────────────────────
let adminToken  = sessionStorage.getItem('adminToken') || '';
let currentBrand = 'knoll-reff';
let currentStyle = 'straight';
let pageData    = null;   // response from pricing-by-size
let layersData  = null;   // response from layers-by-brand-style
let allOrders   = [];
let pendingUpload = null; // { layerType, optionSlug }

const BRAND_NAMES = { 'knoll-reff': 'Knoll Reff', 'steelcase-avenir': 'Steelcase Avenir' };
const STYLE_NAMES = { 'straight': 'Straight', 'l-shape': 'L-Shape' };
const FABRIC_HEX  = { graphite:'#3A3A3A', mystique:'#5A4E6E', osprey:'#6B9BAF', fossil:'#8A7E6A', zinc:'#7A7A7A' };

// ── Auth ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const pw = document.getElementById('gate-pw').value.trim();
  if (!pw) return;
  const btn = document.getElementById('gate-btn');
  btn.disabled = true; btn.textContent = 'Checking…';
  document.getElementById('gate-err').textContent = '';
  try {
    const r = await fetch('/api/auth/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (d.ok) {
      adminToken = pw;
      sessionStorage.setItem('adminToken', pw);
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('app').style.flexDirection = 'column';
      await loadProductsData();
    } else {
      document.getElementById('gate-err').textContent = 'Incorrect password.';
      const inp = document.getElementById('gate-pw');
      inp.classList.add('shake');
      setTimeout(() => inp.classList.remove('shake'), 400);
    }
  } catch (e) {
    document.getElementById('gate-err').textContent = 'Connection error.';
  } finally {
    btn.disabled = false; btn.textContent = 'Enter Admin';
  }
}

function doLogout() {
  sessionStorage.removeItem('adminToken');
  adminToken = '';
  location.reload();
}

// On page load — auto-login if token cached
if (adminToken) {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  loadProductsData();
}

// ── Navigation ────────────────────────────────────────────────────────────
function showSection(section) {
  document.getElementById('section-products').style.display = section === 'products' ? '' : 'none';
  document.getElementById('section-orders').style.display   = section === 'orders'   ? '' : 'none';
  document.getElementById('nav-products').classList.toggle('active', section === 'products');
  document.getElementById('nav-orders').classList.toggle('active',   section === 'orders');
  if (section === 'orders' && allOrders.length === 0) loadOrders();
}

function selectBrand(slug) {
  currentBrand = slug;
  document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('brand-' + slug).classList.add('active');
  loadProductsData();
}

function selectStyle(slug) {
  currentStyle = slug;
  document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('style-' + slug).classList.add('active');
  loadProductsData();
}

// ── Load products data ────────────────────────────────────────────────────
async function loadProductsData() {
  document.getElementById('products-loading').style.display = '';
  document.getElementById('products-error').style.display = 'none';
  document.getElementById('size-cards').innerHTML = '';
  document.getElementById('pedestal-section').innerHTML = '';

  try {
    const qs = `brand_slug=${currentBrand}&style_slug=${currentStyle}`;
    const [pRes, lRes] = await Promise.all([
      apiFetch(`/api/admin/pricing-by-size?${qs}`),
      apiFetch(`/api/admin/layers-by-brand-style?${qs}`)
    ]);
    if (!pRes.success) throw new Error(pRes.error || 'Failed to load pricing');

    pageData   = pRes;
    layersData = lRes.layers || {};
    document.getElementById('products-loading').style.display = 'none';
    renderSizeCards();
    renderPedestalSection();
  } catch (e) {
    document.getElementById('products-loading').style.display = 'none';
    const errEl = document.getElementById('products-error');
    errEl.style.display = '';
    errEl.textContent = `Error loading data: ${e.message}. If this is a new setup, run the SQL migration and seedPricing.js first.`;
  }
}

// ── Price saving ──────────────────────────────────────────────────────────
// Global Enter listener for price inputs
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('price-input')) {
    e.preventDefault();
    saveSingleInput(e.target);
  }
});

document.addEventListener('input', e => {
  if (e.target.classList.contains('price-input')) {
    const original = parseFloat(e.target.dataset.original);
    const current  = parseFloat(e.target.value);
    e.target.classList.toggle('dirty', !isNaN(original) && original !== current || (isNaN(original) && e.target.value !== ''));
  }
});

async function saveSingleInput(input) {
  const price    = parseFloat(input.value);
  const type     = input.dataset.type;
  const optionId = input.dataset.optionId || null;
  const sizeId   = input.dataset.sizeId   || null;
  if (isNaN(price)) return;
  input.disabled = true;
  const ok = await savePrice(type, optionId, sizeId, price);
  input.disabled = false;
  if (ok) {
    input.dataset.original = price;
    input.classList.remove('dirty');
    input.classList.add('saved');
    setTimeout(() => input.classList.remove('saved'), 2000);
  }
}

async function saveAllInCard(sizeId) {
  const card = document.getElementById('card-' + sizeId);
  if (!card) return;
  const btn    = card.querySelector('.btn-save-all');
  const inputs = card.querySelectorAll('.price-input');
  btn.textContent = 'Saving…'; btn.disabled = true;
  await Promise.all(Array.from(inputs).map(inp => saveSingleInput(inp)));
  btn.textContent = 'Saved!';
  setTimeout(() => { btn.textContent = 'Save all prices'; btn.disabled = false; }, 2000);
}

async function saveAllPedestals() {
  const section = document.getElementById('pedestal-section');
  const btn     = section.querySelector('.btn-save-all');
  const inputs  = section.querySelectorAll('.price-input');
  btn.textContent = 'Saving…'; btn.disabled = true;
  await Promise.all(Array.from(inputs).map(inp => saveSingleInput(inp)));
  btn.textContent = 'Saved!';
  setTimeout(() => { btn.textContent = 'Save all pedestal prices'; btn.disabled = false; }, 2000);
}

async function savePrice(type, optionId, sizeId, priceUsd) {
  try {
    const body = { type, option_id: optionId, size_id: sizeId || undefined,
      brand_slug: currentBrand, style_slug: currentStyle, price_usd: priceUsd };
    const d = await apiFetch('/api/admin/pricing', { method: 'PUT', body: JSON.stringify(body) });
    if (!d.success) { toast(d.error || 'Save failed', 'error'); return false; }
    return true;
  } catch (e) {
    toast(e.message, 'error'); return false;
  }
}

// ── Layer uploads ─────────────────────────────────────────────────────────
function triggerUpload(layerType, optionSlug) {
  pendingUpload = { layerType, optionSlug: optionSlug || null };
  document.getElementById('shared-file-input').value = '';
  document.getElementById('shared-file-input').click();
}

document.getElementById('shared-file-input').addEventListener('change', async function () {
  if (!pendingUpload || !this.files[0]) return;
  const { layerType, optionSlug } = pendingUpload;
  pendingUpload = null;
  await doUpload(this.files[0], layerType, optionSlug);
});

async function doUpload(file, layerType, optionSlug) {
  toast('Uploading…', 'warn');
  const fd = new FormData();
  fd.append('file', file);
  fd.append('brand_slug', currentBrand);
  fd.append('style_slug', currentStyle);
  fd.append('layer_type', layerType);
  if (optionSlug) fd.append('option_slug', optionSlug);
  try {
    const r = await fetch('/api/admin/layers/upload', {
      method: 'POST',
      headers: { Authorization: adminToken },
      body: fd
    });
    const d = await r.json();
    if (d.success) {
      toast('Image uploaded', 'success');
      await loadProductsData();
    } else {
      toast(d.error || 'Upload failed', 'error');
    }
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── Orders ────────────────────────────────────────────────────────────────
async function loadOrders() {
  document.getElementById('orders-loading').style.display = '';
  document.getElementById('orders-table-wrap').style.display = 'none';
  try {
    const d = await apiFetch('/api/admin/configs');
    allOrders = d.configs || [];
    document.getElementById('orders-loading').style.display = 'none';
    document.getElementById('orders-table-wrap').style.display = '';
    renderOrders(allOrders);
  } catch (e) {
    document.getElementById('orders-loading').style.display = 'none';
    toast('Failed to load orders: ' + e.message, 'error');
  }
}

function filterOrders() {
  const q    = document.getElementById('orders-search').value.toLowerCase();
  const from = document.getElementById('orders-from').value;
  const to   = document.getElementById('orders-to').value;
  const filtered = allOrders.filter(c => {
    const matchQ = !q || (c.config_code||'').toLowerCase().includes(q) ||
                          (c.client_name||'').toLowerCase().includes(q) ||
                          (c.client_email||'').toLowerCase().includes(q);
    const d = c.created_at?.slice(0, 10) || '';
    const matchFrom = !from || d >= from;
    const matchTo   = !to   || d <= to;
    return matchQ && matchFrom && matchTo;
  });
  renderOrders(filtered);
}

function renderOrders(configs) {
  const tbody = document.getElementById('orders-tbody');
  if (!configs.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="no-data">No configurations yet</td></tr>`;
    return;
  }
  tbody.innerHTML = configs.map(c => {
    const date  = c.created_at ? new Date(c.created_at).toLocaleDateString() : '—';
    const price = c.total_price_usd ? `$${Number(c.total_price_usd).toLocaleString()}` : '—';
    const client = c.client_name || c.client_email || '—';
    const sizeLabel = c.size_id ? '' : '';
    return `<tr>
      <td><span class="config-code">${esc(c.config_code||'')}</span></td>
      <td>${date}</td>
      <td>${esc(c.notes ? c.notes.slice(0,30) : '—')}</td>
      <td>${esc(client)}</td>
      <td>${price}</td>
      <td><div class="actions-cell">
        <a class="btn-action btn-view" href="/?code=${esc(c.config_code)}" target="_blank">View</a>
        <a class="btn-action btn-pdf" href="/api/pdf/download/${esc(c.config_code)}" target="_blank">PDF</a>
      </div></td>
    </tr>`;
  }).join('');
}

function exportCSV() {
  const from = document.getElementById('orders-from').value;
  const to   = document.getElementById('orders-to').value;
  const rows = allOrders.filter(c => {
    const d = c.created_at?.slice(0, 10) || '';
    return (!from || d >= from) && (!to || d <= to);
  });
  const cols = ['config_code','created_at','client_name','client_email','client_company','total_price_usd','quantity','notes'];
  const csv  = [cols.join(','), ...rows.map(c => cols.map(k => JSON.stringify(c[k]??'')).join(','))].join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `eltru-configs-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Utilities ─────────────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const defaults = { headers: { 'Content-Type': 'application/json', Authorization: adminToken } };
  const merged   = { ...defaults, ...opts, headers: { ...defaults.headers, ...(opts.headers || {}) } };
  if (opts.body && !(opts.body instanceof FormData)) {
    merged.headers['Content-Type'] = 'application/json';
  } else if (opts.body instanceof FormData) {
    delete merged.headers['Content-Type']; // let browser set multipart boundary
  }
  const r = await fetch(url, merged);
  if (r.status === 401) { doLogout(); throw new Error('Session expired'); }
  return r.json();
}

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
